<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目面板</title>
  <link rel="stylesheet" href="/static/manager.css?v=20260616b">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-box">
        <strong class="brand-text">yicun</strong>
      </div>
      <nav class="side-nav">
        <button id="homeNavBtn" class="nav-item active" type="button" data-view="home">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 10.5L12 4l8 6.5" />
              <path d="M6.5 9.5V20h11V9.5" />
              <path d="M10 20v-5h4v5" />
            </svg>
          </span>
          <span>主页</span>
        </button>
        <button id="projectNavBtn" class="nav-item" type="button" data-view="projects">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 7h16v10H4z" />
              <path d="M7 7V5h10v2" />
              <path d="M7 11h10" />
            </svg>
          </span>
          <span>项目</span>
        </button>
        <button id="teamNavBtn" class="nav-item" type="button" data-view="team">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
              <path d="M16.5 12a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
              <path d="M4.5 19a4.5 4.5 0 0 1 9 0" />
              <path d="M13.5 19a3.5 3.5 0 0 1 7 0" />
            </svg>
          </span>
          <span>团队</span>
        </button>
      </nav>
    </aside>

    <main class="content">
      <section id="dashboardView" class="dashboard-view" hidden>
        <section class="dashboard-hero">
          <div class="dashboard-hero-copy">
            <p id="dashboardDate" class="dashboard-date">2026年6月16日 星期二</p>
            <div class="dashboard-clock">
              <span id="dashboardHour">14:44</span>
              <span id="dashboardSecond">:34</span>
            </div>
            <p id="dashboardGreeting" class="dashboard-greeting">下午好，yicun ☀</p>
            <p class="dashboard-note">保持专注，今天又是崭新的一天！</p>
          </div>
          <div class="dashboard-hero-art" aria-hidden="true"></div>
        </section>

        <section class="dashboard-grid">
          <section class="dashboard-card dashboard-projects">
            <div class="dashboard-card-head">
              <h3>我的项目</h3>
              <button class="mini-link" type="button" data-go-view="projects">查看全部</button>
            </div>
            <div id="dashboardProjectList" class="dashboard-project-list"></div>
          </section>

          <section class="dashboard-card dashboard-activity">
            <div class="dashboard-card-head">
              <h3>最新动态</h3>
              <button class="mini-link" type="button" data-go-view="projects">查看全部</button>
            </div>
            <div id="dashboardActivityList" class="dashboard-activity-list"></div>
          </section>

          <section class="dashboard-card dashboard-team">
            <div class="dashboard-card-head">
              <h3>团队成员</h3>
              <button class="mini-link" type="button" data-go-view="team">查看全部</button>
            </div>
            <div id="dashboardTeamList" class="dashboard-team-list"></div>
          </section>
        </section>
      </section>

      <section class="top-strip">
        <div class="top-strip-left">
          <button id="backBtn" class="ghost-btn" type="button" hidden>返回</button>
          <span id="scopeLabel" class="scope-label">主页</span>
        </div>
        <div class="top-strip-right">
          <label class="search-box">
            <input id="searchInput" type="search" placeholder="Search">
          </label>
          <button id="createBtn" class="add-btn" type="button" title="创建">+</button>
        </div>
      </section>

      <section id="statusBanner" class="status-banner" hidden></section>

      <section id="classSection" class="class-section" hidden>
        <div class="class-section-head">
          <div class="class-tabs" role="tablist" aria-label="Class tools">
            <button class="class-tab active" type="button">Raw</button>
            <button class="class-tab" type="button">Constructor</button>
          </div>
          <div class="class-section-actions">
            <button id="addClassBtn" class="class-tool-btn" type="button">Add label <span>+</span></button>
            <button id="classSkeletonBtn" class="class-tool-btn" type="button" disabled>Setup skeleton <span>+</span></button>
            <button id="classModelBtn" class="class-tool-btn" type="button" disabled>From model <span>+</span></button>
            <button id="saveClassBtn" class="class-save-btn" type="button">Save changes</button>
          </div>
        </div>
        <div id="classList" class="class-list"></div>
      </section>

      <section id="emptyState" class="empty-state" hidden>
        <h3>还没有内容</h3>
        <p id="emptyText">先创建一个项目，后续再往里面添加数据包。</p>
      </section>

      <section id="grid" class="card-grid"></section>

      <section id="teamSection" class="team-section" hidden>
        <div id="teamList" class="team-list"></div>
      </section>
    </main>
  </div>

  <dialog id="projectDialog" class="form-dialog">
    <form id="projectForm" method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">Create Project</p>
          <h3>创建项目</h3>
        </div>
        <button class="icon-btn" type="button" data-close="projectDialog">×</button>
      </div>
      <label class="field">
        <span>项目名称</span>
        <input id="projectName" name="name" type="text" placeholder="例如：坑槽检测项目" required>
      </label>
      <label class="field">
        <span>项目说明</span>
        <textarea id="projectDescription" name="description" rows="4" placeholder="补充项目背景、任务说明、交付要求等"></textarea>
      </label>
      <div class="dialog-actions">
        <button class="ghost-btn" type="button" data-close="projectDialog">取消</button>
        <button class="primary-btn" type="submit">保存项目</button>
      </div>
    </form>
  </dialog>

  <dialog id="packageDialog" class="form-dialog">
    <form id="packageForm" method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">Create Package</p>
          <h3>创建数据包</h3>
        </div>
        <button class="icon-btn" type="button" data-close="packageDialog">×</button>
      </div>
      <label class="field">
        <span>包名称</span>
        <input id="packageName" name="name" type="text" placeholder="例如：20260616更新包" required>
      </label>
      <label class="field">
        <span>图片路径</span>
        <input id="packageImagesPath" name="imagesPath" type="text" placeholder="/abs/path/to/images" required>
      </label>
      <label class="field">
        <span>标签路径</span>
        <input id="packageLabelsPath" name="labelsPath" type="text" placeholder="/abs/path/to/labels（可留空，无标签标注）">
      </label>
      <label class="field">
        <span>标注格式</span>
        <select id="packageFormat" name="format">
          <option value="seg">SEG</option>
          <option value="hbb">HBB</option>
          <option value="obb">OBB</option>
        </select>
      </label>
      <label class="field">
        <span>备注</span>
        <textarea id="packageRemark" name="remark" rows="4" placeholder="可记录本次更新来源、筛选规则、时间说明等"></textarea>
      </label>
      <div class="dialog-actions">
        <button class="ghost-btn" type="button" data-close="packageDialog">取消</button>
        <button class="primary-btn" type="submit">保存数据包</button>
      </div>
    </form>
  </dialog>

  <dialog id="memberDialog" class="form-dialog">
    <form id="memberForm" method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">Create Member</p>
          <h3>添加团队成员</h3>
        </div>
        <button class="icon-btn" type="button" data-close="memberDialog">×</button>
      </div>
      <label class="field">
        <span>名字</span>
        <input id="memberName" name="name" type="text" placeholder="例如：xiaohang" required>
      </label>
      <label class="field">
        <span>IP</span>
        <input id="memberIp" name="ip" type="text" placeholder="例如：192.168.1.21">
      </label>
      <label class="field">
        <span>用户名</span>
        <input id="memberUsername" name="username" type="text" placeholder="例如：admin">
      </label>
      <label class="field">
        <span>密码</span>
        <input id="memberPassword" name="password" type="text" placeholder="例如：123456">
      </label>
      <label class="field">
        <span>主页地址</span>
        <input id="memberHomeUrl" name="homeUrl" type="text" placeholder="例如：http://192.168.1.21:8000">
      </label>
      <label class="field">
        <span>备注</span>
        <textarea id="memberRemark" name="remark" rows="4" placeholder="可记录设备用途、归属、说明等"></textarea>
      </label>
      <div class="dialog-actions">
        <button class="ghost-btn" type="button" data-close="memberDialog">取消</button>
        <button class="primary-btn" type="submit">保存成员</button>
      </div>
    </form>
  </dialog>

  <dialog id="classDialog" class="form-dialog">
    <form id="classForm" method="dialog" class="dialog-card class-dialog-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">Edit Label</p>
          <h3 id="classDialogTitle">编辑类别</h3>
        </div>
        <button class="icon-btn" type="button" data-close="classDialog">×</button>
      </div>
      <label class="field">
        <span>类别 ID</span>
        <input id="classIdInput" name="classId" type="text" readonly>
      </label>
      <label class="field">
        <span>类别名称</span>
        <input id="classNameInput" name="className" type="text" placeholder="例如：Crack" required>
      </label>
      <label class="field">
        <span>颜色</span>
        <input id="classColorInput" name="classColor" type="color" value="#ff4d4f">
      </label>
      <div class="dialog-actions">
        <button class="ghost-btn" type="button" data-close="classDialog">取消</button>
        <button class="primary-btn" type="submit">保存标签</button>
      </div>
    </form>
  </dialog>

  <script src="/static/manager.js?v=20260616b"></script>
</body>
</html>
